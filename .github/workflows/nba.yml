name: NBA Bot

on:
  schedule:
    - cron: '0 2 * * *'  # 每天
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - run: pip install requests pandas

      - run: python main.py
