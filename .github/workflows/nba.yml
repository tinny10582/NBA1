name: Sports Bot

on:
  schedule:
    # 🟢 台灣 01:00 → NBA預測
    - cron: '0 17 * * *'

    # 🔵 台灣 18:00 → MLB + NBA驗證
    - cron: '0 10 * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: pip install requests pandas

      - name: 執行系統
        run: python main.py
