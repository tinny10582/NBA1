name: NBA Bot

on:
  schedule:
    # 🟢 每天下午 2 點（台灣時間）
    - cron: '0 6 * * *'

    # 🟢 每天晚上 10 點（台灣時間，再更新一次）
    - cron: '0 14 * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: pip install requests pandas

      - name: 執行 NBA 預測
        run: python main.py
