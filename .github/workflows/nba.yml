name: NBA Bot

on:
  schedule:
    # 🟢 下午2點（台灣）→ 預測
    - cron: '0 6 * * *'

    # 🟢 晚上10點（台灣）→ 預測再更新
    - cron: '0 14 * * *'

    # 🔥 新增👇 晚上6點（台灣）→ 驗證結果
    - cron: '0 10 * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: pip install requests pandas

      - name: 執行 NBA 系統
        run: python main.py
